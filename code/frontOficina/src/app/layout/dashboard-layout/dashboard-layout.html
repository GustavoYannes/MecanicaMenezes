<div class="flex h-screen bg-brand-background overflow-hidden font-sans">
  
  <!-- Backdrop for Mobile Desktop menu -->
  <div 
    *ngIf="isMobile && isMobileMenuOpen" 
    (click)="closeMobileMenu()"
    class="fixed inset-0 bg-black/50 z-20 transition-opacity lg:hidden"
    aria-hidden="true"
  ></div>

  <!-- Sidebar (Fixed Desktop // Drawer Mobile) -->
  <div 
    [ngClass]="isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed inset-y-0 left-0 z-30 w-64 transition duration-300 transform lg:static lg:translate-x-0 lg:flex-shrink-0"
  >
    <app-sidebar (closeMenu)="closeMobileMenu()"></app-sidebar>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <!-- Top Navbar -->
    <app-top-navbar (toggleMenu)="toggleMobileMenu()"></app-top-navbar>

    <!-- Page Content -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto p-6 bg-transparent">
      <!-- The inner routes will render their components here -->
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
