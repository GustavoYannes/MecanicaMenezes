<header class="w-full flex items-center justify-between px-6 py-4 bg-transparent">
  <!-- Left Side: Hamburger (Mobile) + Title -->
  <div class="flex items-center space-x-4">
    <!-- Hamburger Menu (Visible only on Mobile) -->
    <button 
      (click)="onMenuClick()"
      class="lg:hidden text-brand-primary p-2 hover:bg-brand-primary/10 rounded-full transition-colors focus:outline-none"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
    
    <!-- Title -->
    <h1 class="text-2xl font-bold text-brand-primary">{{ pageTitle }}</h1>
  </div>

  <!-- Right Side: User Card -->
  <div class="flex items-center">
    <app-user-card></app-user-card>
  </div>
</header>
