<div class="flex flex-col h-full bg-brand-primary text-white w-64 shadow-xl relative z-20">
  
  <!-- Logo Section -->
  <div class="px-6 py-8 flex items-center space-x-3">
    <!-- Wrench/Gear icon for Oficina -->
    <div class="w-8 h-8 rounded bg-brand-accent flex items-center justify-center text-white">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    </div>
    <span class="text-xl font-bold tracking-wide">Mecânica Menezes</span>
  </div>

  <!-- Primary Action Button -->
  <div class="px-6 mb-6">
    <button class="w-full bg-brand-accent hover:bg-orange-500 text-white font-semibold py-3 px-4 rounded-xl shadow transition-colors flex items-center justify-center space-x-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      <span>Registrar Entrada</span>
    </button>
  </div>

  <!-- Navigation Menu -->
  <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
    <a 
      *ngFor="let item of menuItems" 
      [routerLink]="item.path" 
      routerLinkActive="bg-brand-surface text-brand-primary font-semibold shadow-sm"
      [routerLinkActiveOptions]="{exact: false}"
      (click)="closeMenu.emit()"
      class="flex items-center space-x-4 px-4 py-3 rounded-xl text-brand-muted hover:text-white hover:bg-white/10 transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"></path>
      </svg>
      <span class="text-sm">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Footer App Info (Optional) -->
  <div class="p-6">
    <a href="#" class="flex items-center justify-center w-10 h-10 rounded-full bg-white/10 text-brand-accent hover:bg-white/20 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </a>
  </div>
</div>
