<div class="min-h-screen flex items-center justify-center p-4 bg-brand-background text-brand-text font-sans">
  <div class="w-full max-w-sm flex flex-col items-center">

    <!-- Logo -->
    <div class="w-16 h-16 bg-brand-primary rounded-2xl flex items-center justify-center mb-6 shadow-md">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
    </div>

    <!-- Title -->
    <h1 class="text-3xl font-extrabold text-brand-primary tracking-tight mb-2">Oficina</h1>
    <p class="text-brand-muted text-sm mb-8 text-center font-medium">Sistema de gerenciamento da oficina</p>

    <!-- Card Principal -->
    <div class="bg-brand-surface w-full rounded-[2rem] p-8 shadow-sm">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-6">

        <!-- Error Message -->
        <div *ngIf="errorMessage"
          class="bg-red-50 text-red-500 text-sm p-3 rounded-xl border border-red-100 text-center">
          {{ errorMessage }}
        </div>

        <!-- CPF Field -->
        <div class="flex flex-col space-y-2">
          <label class="text-sm font-semibold text-brand-text" for="cpf">CPF</label>
          <div class="relative flex items-center">
            <!-- User Icon -->
            <svg class="w-5 h-5 text-brand-muted absolute left-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>

            <input id="cpf" type="text" formControlName="cpf" placeholder="Digite seu CPF" mask="000.000.000-00"
              class="w-full bg-brand-input bg-opacity-70 text-brand-text placeholder-brand-muted rounded-2xl py-3 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-brand-primary placeholder:text-sm font-medium transition-all">
          </div>
          <div *ngIf="loginForm.get('cpf')?.touched && loginForm.get('cpf')?.invalid" class="text-xs text-red-500 pl-1">
            CPF inválido
          </div>
        </div>

        <!-- Password Field -->
        <div class="flex flex-col space-y-2">
          <label class="text-sm font-semibold text-brand-text" for="senha">Senha</label>
          <div class="relative flex items-center">
            <!-- Lock Icon -->
            <svg class="w-5 h-5 text-brand-muted absolute left-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
              </path>
            </svg>

            <input id="senha" [type]="showPassword ? 'text' : 'password'" formControlName="senha"
              placeholder="Insira sua senha"
              class="w-full bg-brand-input bg-opacity-70 text-brand-text placeholder-brand-muted rounded-2xl py-3 pl-12 pr-12 focus:outline-none focus:ring-2 focus:ring-brand-primary placeholder:text-sm font-medium transition-all">

            <!-- Eye Toggle -->
            <button type="button" (click)="togglePasswordVisibility()"
              class="absolute right-4 text-brand-muted hover:text-brand-text transition-colors">
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                </path>
              </svg>
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                </path>
              </svg>
            </button>
          </div>
          <div *ngIf="loginForm.get('senha')?.touched && loginForm.get('senha')?.invalid"
            class="text-xs text-red-500 pl-1">
            A senha é obrigatória
          </div>
        </div>

        <div class="flex justify-start w-full">
          <a href="#" class="text-sm font-semibold text-brand-muted mt-2 mb-4 hover:underline">Esqueceu a senha?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="loading"
          class="w-full bg-brand-primary text-white font-semibold py-3.5 rounded-2xl hover:opacity-90 active:scale-[0.98] focus:outline-none focus:ring-4 focus:ring-brand-primary/20 transition-all flex justify-center items-center">
          <span *ngIf="!loading">Login</span>
          <!-- Loading Spinner -->
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
        </button>

      </form>
    </div>

    <!-- Footer Help -->
    <div class="mt-8">
      <p class="text-brand-muted text-sm hover:underline cursor-pointer">Precisa de Ajuda?</p>
    </div>

  </div>
</div>
