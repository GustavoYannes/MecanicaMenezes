name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    # Use the latest Ubuntu runner for a consistent Linux build environment
    runs-on: ubuntu-latest
    defaults:
      run:
        # Run shell commands from the Spring Boot project's working directory
        working-directory: ./code/backoficina

    steps:
      # Check out the repository so the workflow can access the application source code
      - name: Check out source code
        uses: actions/checkout@v4

      # Set up Temurin JDK 25 and enable built-in Maven dependency caching
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Build the Spring Boot project and run the full Maven test suite
      - name: Build and test with Maven
        run: mvn clean install --batch-mode --no-transfer-progress
